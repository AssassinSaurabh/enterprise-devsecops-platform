apiVersion: apps/v1
kind: Deployment

metadata:
  name: auth-service
  namespace: dev

spec:
  replicas: 3

  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service

    spec:
      containers:
        - name: auth-service

          image: auth-service:latest

          imagePullPolicy: Never

          ports:
            - containerPort: 5001
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
