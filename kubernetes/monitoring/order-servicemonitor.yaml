apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: order-service
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: order-service
  namespaceSelector:
    matchNames:
      - dev  # change this to 'dev' if you moved your services to the dev namespace
  endpoints:
  - port: http # Make sure your Service file (auth-service.yaml, order-service.yaml) defines name: http for the target port
    path: /metrics
    interval: 15s
