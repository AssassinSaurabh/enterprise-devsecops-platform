apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: payment-service
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: payment-service
  namespaceSelector:
    matchNames:
      - dev  # change this to 'dev' if you moved your services to the dev namespace
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
