name: Platform CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate Kubernetes manifests
        run: |
          kubectl kustomize kubernetes >/tmp/kubernetes-rendered.yaml
          kubectl kustomize security/opa/gatekeeper >/tmp/gatekeeper-rendered.yaml

      - name: Check Terraform formatting
        run: terraform fmt -recursive -check terraform

      - name: Initialize Terraform design
        run: terraform -chdir=terraform/environments/prod-design init -backend=false

      - name: Validate Terraform design
        run: terraform -chdir=terraform/environments/prod-design validate

  docker-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - auth-service
          - order-service
          - payment-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build service image
        run: docker build -t ${{ matrix.service }} ./app/${{ matrix.service }}
