# Falco Sprint 4 local Kind configuration.
# Install with:
# helm upgrade --install falco falcosecurity/falco \
#   --namespace falco --create-namespace \
#   --version 9.1.0 \
#   -f security/falco/values-kind.yaml

image:
  pullPolicy: IfNotPresent

driver:
  enabled: true
  kind: auto

controller:
  kind: daemonset

tty: true

metrics:
  enabled: true
  interval: 15m
  service:
    create: true
    type: ClusterIP

serviceMonitor:
  create: true
  labels:
    release: monitoring
  interval: 15s
  scrapeTimeout: 10s
  endpointPort: metrics

falco:
  priority: notice
  json_output: true
  json_include_output_property: true
  json_include_output_fields_property: true
  json_include_tags_property: true
  time_format_iso_8601: true
  stdout_output:
    enabled: true
  syslog_output:
    enabled: false
  http_output:
    enabled: false
  webserver:
    enabled: true
    listen_port: 8765
    listen_address: 0.0.0.0
    prometheus_metrics_enabled: true

customRules:
  platform-runtime-rules.yaml: |-
    - rule: Platform Shell Spawned In Application Container
      desc: Detect an interactive shell started inside an application container.
      condition: >
        spawned_process and container and
        k8s.ns.name=dev and
        proc.name in (bash, sh, zsh, dash, ash)
      output: >
        Shell spawned inside application container
        (user=%user.name command=%proc.cmdline container=%container.name image=%container.image.repository pod=%k8s.pod.name namespace=%k8s.ns.name)
      priority: WARNING
      tags:
        - platform
        - container
        - runtime
        - shell

    - rule: Platform Sensitive File Read In Application Container
      desc: Detect reads of sensitive Linux identity files from application containers.
      condition: >
        open_read and container and
        k8s.ns.name=dev and
        fd.name in (/etc/passwd, /etc/shadow, /etc/sudoers)
      output: >
        Sensitive file read inside application container
        (user=%user.name command=%proc.cmdline file=%fd.name container=%container.name image=%container.image.repository pod=%k8s.pod.name namespace=%k8s.ns.name)
      priority: WARNING
      tags:
        - platform
        - container
        - runtime
        - sensitive-file

    - rule: Platform Package Manager Started In Application Container
      desc: Detect package manager execution inside application containers.
      condition: >
        spawned_process and container and
        k8s.ns.name=dev and
        proc.name in (apt, apt-get, apk, yum, dnf, rpm, dpkg, pip, pip3, npm)
      output: >
        Package manager started inside application container
        (user=%user.name command=%proc.cmdline container=%container.name image=%container.image.repository pod=%k8s.pod.name namespace=%k8s.ns.name)
      priority: WARNING
      tags:
        - platform
        - container
        - runtime
        - package-manager
