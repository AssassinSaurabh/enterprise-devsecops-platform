apiVersion: v1
kind: Pod
metadata:
  name: opa-compliant-test
  namespace: dev
spec:
  restartPolicy: Never
  containers:
    - name: opa-compliant-test
      image: busybox:1.36
      command:
        - sleep
        - "60"
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 64Mi
