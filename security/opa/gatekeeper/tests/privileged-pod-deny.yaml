apiVersion: v1
kind: Pod
metadata:
  name: opa-privileged-test
  namespace: dev
spec:
  containers:
    - name: opa-privileged-test
      image: busybox:1.36
      command:
        - sleep
        - "60"
      securityContext:
        privileged: true
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 64Mi
