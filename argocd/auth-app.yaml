apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: enterprise-devsecops-platform

  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/saurabhpandey/enterprise-devsecops-platform.git

    targetRevision: main

    path: kubernetes

  destination:
    server: https://kubernetes.default.svc

    namespace: dev

  syncPolicy:
    automated:
      prune: true

      selfHeal: true
